<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Materi</title>

<style>

/* ================= BODY ================= */
body{
margin:0;
background:url("images/sectionmenu.jpg") no-repeat center center/cover;
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

/* ================= CONTAINER ================= */
.menu{
position:relative;
width:100%;
height:100%;
z-index:2;
}

/* ================= TOMBOL BULAT TRANSPARAN (NO BLUR) ================= */
.btn{
position:absolute;
border-radius:50%;
cursor:pointer;
aspect-ratio:1 / 1;

/* ✅ transparan bersih (TIDAK BUREM) */
background:rgba(255,255,255,0.08);

/* glow halus */
box-shadow:
0 0 10px rgba(255,255,255,0.25),
inset 0 0 10px rgba(255,255,255,0.15);

transition:all 0.35s ease;

/* animasi hidup */
animation:floatBtn 4s ease-in-out infinite;
}

/* ✨ efek pantulan (biar keliatan glossy, bukan blur) */
.btn::after{
content:"";
position:absolute;
top:15%;
left:25%;
width:25%;
height:25%;
background:rgba(255,255,255,0.4);
border-radius:50%;
filter:blur(2px);
opacity:0.7;
}

/* ✨ HOVER */
.btn:hover{
transform:scale(1.15);

box-shadow:
0 0 20px white,
0 0 40px cyan,
0 0 60px rgba(0,255,255,0.6);
}

/* 🌟 RING EFFECT */
.btn::before{
content:"";
position:absolute;
inset:-6px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.25);
opacity:0;
transition:0.4s;
}

.btn:hover::before{
opacity:1;
transform:scale(1.1);
}

/* 🎈 FLOATING */
@keyframes floatBtn{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* ================= POSISI ================= */

/* ATAS 4 */
.s3{ top:10%; left:5%; width:12%; }
.s4{ top:10%; left:30%; width:12%; }
.s5{ top:10%; left:55%; width:12%; }
.s6{ top:10%; left:80%; width:12%; }

/* BAWAH 2 */
.s7{ top:63%; left:82%; width:14%; }
.s8{ top:63%; left:55%; width:14%; }

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
.s3,.s4,.s5,.s6,.s7,.s8{
width:25%;
}
}

</style>
</head>

<body>

<div class="menu">

<div class="btn s3" onclick="go(3)"></div>
<div class="btn s4" onclick="go(4)"></div>
<div class="btn s5" onclick="go(5)"></div>
<div class="btn s6" onclick="go(6)"></div>

<div class="btn s7" onclick="go(7)"></div>
<div class="btn s8" onclick="go(8)"></div>

</div>

<script>
function go(n){
window.location.href = "section"+n+".html";
}
</script>

</body>
</html>
